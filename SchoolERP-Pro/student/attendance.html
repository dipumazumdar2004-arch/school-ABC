<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/student.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-user-graduate"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Student</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="attendance.html" class="nav-item-link active">
                    <i class="fa-solid fa-calendar-check"></i> My Attendance
                </a>
                <a href="results.html" class="nav-item-link">
                    <i class="fa-solid fa-square-poll-vertical"></i> My Results
                </a>
                <a href="homework.html" class="nav-item-link">
                    <i class="fa-solid fa-book-open"></i> Homework Files
                </a>
                <a href="notices.html" class="nav-item-link">
                    <i class="fa-solid fa-bullhorn"></i> Notices Feed
                </a>
                <a href="profile.html" class="nav-item-link">
                    <i class="fa-solid fa-user"></i> My Profile
                </a>
                <a href="download.html" class="nav-item-link">
                    <i class="fa-solid fa-download"></i> Downloads
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">My Attendance Reports</h1>
                </div>
                <div class="header-right">
                    <button class="header-action-btn" id="theme-toggle-btn"><i class="fa-solid fa-moon" id="theme-toggle-icon"></i></button>
                </div>
            </header>

            <div class="stats-grid anim-slide-up">
                <div class="stat-card">
                    <div class="stat-card-info">
                        <div class="stat-card-label">Total School Days</div>
                        <div class="stat-card-value" id="stat-total">0</div>
                    </div>
                    <div class="stat-card-icon" style="background: rgba(79,70,229,0.1); color: var(--primary);"><i class="fa-solid fa-calculator"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-info">
                        <div class="stat-card-label">Days Present</div>
                        <div class="stat-card-value" id="stat-present" style="color: var(--success);">0</div>
                    </div>
                    <div class="stat-card-icon" style="background: rgba(16,185,129,0.1); color: var(--success);"><i class="fa-solid fa-circle-check"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-info">
                        <div class="stat-card-label">Days Absent</div>
                        <div class="stat-card-value" id="stat-absent" style="color: var(--danger);">0</div>
                    </div>
                    <div class="stat-card-icon" style="background: rgba(239,68,68,0.1); color: var(--danger);"><i class="fa-solid fa-circle-xmark"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-info">
                        <div class="stat-card-label">Attendance Percentage</div>
                        <div class="stat-card-value" id="stat-rate">100%</div>
                    </div>
                    <div class="stat-card-icon" style="background: rgba(245,158,11,0.1); color: var(--warning);"><i class="fa-solid fa-percent"></i></div>
                </div>
            </div>

            <!-- Attendance Table -->
            <div class="glass-card anim-slide-up" style="margin-top: 24px;">
                <div class="card-header">
                    <h3 class="card-title">Attendance History Logs</h3>
                    <i class="fa-solid fa-calendar-days text-muted"></i>
                </div>
                <div class="card-body" style="padding: 0;">
                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Remarks / Explanations</th>
                                </tr>
                            </thead>
                            <tbody id="attendance-list">
                                <!-- JS items dynamic rendering -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const studentId = window.profile_details.id;
            document.getElementById('user-display-name').textContent = sanitize(window.profile_details.name);

            const attendance = db.getCollection(window.DB_KEYS.ATTENDANCE);
            const myLogs = attendance.filter(a => a.student_id === studentId).sort((a,b) => b.date.localeCompare(a.date));

            const total = myLogs.length;
            const present = myLogs.filter(a => a.status === 'Present').length;
            const absent = myLogs.filter(a => a.status === 'Absent').length;
            const rate = total > 0 ? Math.round((present / total) * 100) : 100;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-present').textContent = present;
            document.getElementById('stat-absent').textContent = absent;
            document.getElementById('stat-rate').textContent = `${rate}%`;

            const container = document.getElementById('attendance-list');
            if (myLogs.length > 0) {
                container.innerHTML = myLogs.map(l => {
                    let badgeClass = 'badge-danger';
                    if (l.status === 'Present') badgeClass = 'badge-success';
                    else if (l.status === 'Late') badgeClass = 'badge-warning';
                    else if (l.status === 'Excused') badgeClass = 'badge-info';

                    return `
                        <tr>
                            <td style="font-weight: 600;">${sanitize(l.date)}</td>
                            <td><span class="badge ${badgeClass}">${sanitize(l.status)}</span></td>
                            <td>${sanitize(l.remarks || '-')}</td>
                        </tr>
                    `;
                }).join('');
            } else {
                container.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-muted); padding: 40px;">No attendance records found.</td></tr>';
            }
        });
    </script>
</body>
</html>
