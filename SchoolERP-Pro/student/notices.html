<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notices Feed | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/student.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-user-graduate"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Student</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="attendance.html" class="nav-item-link">
                    <i class="fa-solid fa-calendar-check"></i> My Attendance
                </a>
                <a href="results.html" class="nav-item-link">
                    <i class="fa-solid fa-square-poll-vertical"></i> My Results
                </a>
                <a href="homework.html" class="nav-item-link">
                    <i class="fa-solid fa-book-open"></i> Homework Files
                </a>
                <a href="notices.html" class="nav-item-link active">
                    <i class="fa-solid fa-bullhorn"></i> Notices Feed
                </a>
                <a href="profile.html" class="nav-item-link">
                    <i class="fa-solid fa-user"></i> My Profile
                </a>
                <a href="download.html" class="nav-item-link">
                    <i class="fa-solid fa-download"></i> Downloads
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">Official Notice Board</h1>
                </div>
                <div class="header-right">
                    <button class="header-action-btn" id="theme-toggle-btn"><i class="fa-solid fa-moon" id="theme-toggle-icon"></i></button>
                </div>
            </header>

            <!-- Notice Board Card -->
            <div class="glass-card anim-slide-up" style="padding: 32px;">
                <div class="notice-timeline" id="notices-list">
                    <!-- Dynamic rendering -->
                </div>
            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-display-name').textContent = sanitize(window.profile_details.name);

            const notices = db.getCollection(window.DB_KEYS.NOTICES);
            const myNotices = notices.filter(n => n.target_audience === 'all' || n.target_audience === 'students').reverse();

            const container = document.getElementById('notices-list');
            if (myNotices.length > 0) {
                container.innerHTML = myNotices.map(n => `
                    <div class="notice-timeline-item">
                        <div class="notice-timeline-marker"></div>
                        <div class="notice-timeline-content">
                            <div class="notice-timeline-header">
                                <h4 class="notice-timeline-title">${sanitize(n.title)}</h4>
                                <span class="notice-timeline-date">${sanitize(n.date)}</span>
                            </div>
                            <p class="notice-timeline-body" style="font-size: 1.05rem; line-height: 1.7; margin-top: 12px;">${sanitize(n.content)}</p>
                            <div style="margin-top: 16px; font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 16px;">
                                <span><i class="fa-regular fa-user"></i> By ${sanitize(n.created_by)}</span>
                                <span><i class="fa-solid fa-users"></i> Audience: ${sanitize(n.target_audience)}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 40px;">No official announcements posted yet.</div>';
            }
        });
    </script>
</body>
</html>
