<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password | SchoolERP-Pro</title>
    
    <!-- CSS imports -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .form-nav-row {
            display: flex;
            justify-content: center;
            margin-top: 24px;
            font-size: 0.9rem;
        }
        .back-link {
            color: var(--primary);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-link:hover {
            color: var(--primary-hover);
        }
        .back-link i {
            transition: var(--transition);
        }
        .back-link:hover i {
            transform: translateX(-4px);
        }
    </style>
</head>
<body class="login-body">
    <!-- Glowing background Orbs -->
    <div class="orb orb-1 anim-orb-1"></div>
    <div class="orb orb-2 anim-orb-2"></div>
 
    <div class="login-wrapper container anim-scale-up">
        <div class="login-logo">
            <a href="index.html">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </a>
        </div>
 
        <div class="login-container glass-card">
            <h2 class="login-title">Reset Password</h2>
            <p class="login-subtitle" id="form-subtitle">Verify your username and registered email address to change your password</p>
 
            <!-- Alerts for Feedback -->
            <div class="alert alert-danger" id="reset-error-alert" style="display: none;">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span class="alert-message" id="error-message">Invalid credentials details.</span>
            </div>
            
            <div class="alert alert-success" id="reset-success-alert" style="display: none;">
                <i class="fa-solid fa-circle-check"></i>
                <span class="alert-message" id="success-message">Verification successful! Enter your new password below.</span>
            </div>
 
            <!-- Step 1: Verification Form -->
            <form id="reset-verify-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username / Login ID</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user input-icon"></i>
                        <input type="text" id="username" class="form-control" placeholder="Enter username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                </div>
 
                <button type="submit" class="btn btn-primary btn-block" id="verify-submit-btn">
                    <span>Verify Account</span>
                    <i class="fa-solid fa-user-check" style="margin-left: 8px;"></i>
                </button>
            </form>
 
            <!-- Step 2: New Password Form -->
            <form id="reset-password-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label" for="new_password">New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-lock input-icon"></i>
                        <input type="password" id="new_password" class="form-control" placeholder="Minimum 6 characters" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-lock input-icon"></i>
                        <input type="password" id="confirm_password" class="form-control" placeholder="Re-type new password" required>
                    </div>
                </div>
 
                <button type="submit" class="btn btn-accent btn-block" id="password-submit-btn">
                    <span>Save New Password</span>
                    <i class="fa-solid fa-floppy-disk" style="margin-left: 8px;"></i>
                </button>
            </form>
 
            <div class="form-nav-row">
                <a href="login.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back to Sign In
                </a>
            </div>
        </div>
    </div>
 
    <!-- JS Scripts -->
    <script src="js/db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const verifyForm = document.getElementById('reset-verify-form');
            const passwordForm = document.getElementById('reset-password-form');
            const errorAlert = document.getElementById('reset-error-alert');
            const successAlert = document.getElementById('reset-success-alert');
            
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const formSubtitle = document.getElementById('form-subtitle');

            let matchedUserId = null;

            // Handle Step 1 Verification
            verifyForm.addEventListener('submit', (e) => {
                e.preventDefault();
                errorAlert.style.display = 'none';
                successAlert.style.display = 'none';

                const usernameVal = document.getElementById('username').value.trim().toLowerCase();
                const emailVal = document.getElementById('email').value.trim().toLowerCase();

                const users = db.getCollection(window.DB_KEYS.USERS);
                const matchedUser = users.find(u => u.username.toLowerCase() === usernameVal && u.email.toLowerCase() === emailVal);

                if (matchedUser) {
                    matchedUserId = matchedUser.id;
                    successAlert.style.display = 'flex';
                    successMsg.textContent = 'Verification successful! Enter your new password below.';
                    
                    formSubtitle.textContent = 'Enter your new strong password below to replace the old credentials';
                    verifyForm.style.display = 'none';
                    passwordForm.style.display = 'block';
                } else {
                    errorAlert.style.display = 'flex';
                    errorMsg.textContent = 'Account verification failed. Incorrect username or email details.';
                }
            });

            // Handle Step 2 Password Update
            passwordForm.addEventListener('submit', (e) => {
                e.preventDefault();
                errorAlert.style.display = 'none';
                successAlert.style.display = 'none';

                const newPassVal = document.getElementById('new_password').value;
                const confirmPassVal = document.getElementById('confirm_password').value;

                if (newPassVal.length < 6) {
                    errorAlert.style.display = 'flex';
                    errorMsg.textContent = 'New password must be at least 6 characters long.';
                    return;
                }

                if (newPassVal !== confirmPassVal) {
                    errorAlert.style.display = 'flex';
                    errorMsg.textContent = 'New password and confirmation passwords do not match.';
                    return;
                }

                const users = db.getCollection(window.DB_KEYS.USERS);
                const uIdx = users.findIndex(u => u.id === matchedUserId);

                if (uIdx !== -1) {
                    users[uIdx].password = newPassVal;
                    db.saveCollection(window.DB_KEYS.USERS, users);

                    successAlert.style.display = 'flex';
                    successMsg.textContent = 'Password reset successfully! You can now log in.';
                    formSubtitle.textContent = 'Password reset was successful. Navigate back to Sign In page.';
                    passwordForm.style.display = 'none';
                } else {
                    errorAlert.style.display = 'flex';
                    errorMsg.textContent = 'Failed to reset password. User record not found.';
                }
            });
        });
    </script>
</body>
</html>
