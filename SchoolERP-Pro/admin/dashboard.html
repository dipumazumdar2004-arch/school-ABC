<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        .admin-flex-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 24px;
        }
        @media (max-width: 992px) {
            .admin-flex-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-user-shield"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Administrator</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link active">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item-link">
                    <i class="fa-solid fa-user-graduate"></i> Students
                </a>
                <a href="teachers.html" class="nav-item-link">
                    <i class="fa-solid fa-chalkboard-user"></i> Teachers
                </a>
                <a href="classes.html" class="nav-item-link">
                    <i class="fa-solid fa-school"></i> Classes
                </a>
                <a href="subjects.html" class="nav-item-link">
                    <i class="fa-solid fa-book"></i> Subjects
                </a>
                <a href="attendance.html" class="nav-item-link">
                    <i class="fa-solid fa-calendar-check"></i> Attendance
                </a>
                <a href="marks.html" class="nav-item-link">
                    <i class="fa-solid fa-file-signature"></i> Marks
                </a>
                <a href="results.html" class="nav-item-link">
                    <i class="fa-solid fa-square-poll-vertical"></i> Results
                </a>
                <a href="certificates.html" class="nav-item-link">
                    <i class="fa-solid fa-award"></i> Certificates
                </a>
                <a href="reports.html" class="nav-item-link">
                    <i class="fa-solid fa-chart-line"></i> Reports
                </a>
                <a href="settings.html" class="nav-item-link">
                    <i class="fa-solid fa-sliders"></i> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">Admin Dashboard</h1>
                </div>
                <div class="header-right">
                    <button class="header-action-btn" id="theme-toggle-btn"><i class="fa-solid fa-moon" id="theme-toggle-icon"></i></button>
                </div>
            </header>

            <div class="stats-grid anim-slide-up">
                <div class="stat-card">
                    <div class="stat-card-info">
                        <div class="stat-card-label">Active Students</div>
                        <div class="stat-card-value" id="stat-students">0</div>
                    </div>
                    <div class="stat-card-icon" style="background: rgba(6,182,212,0.1); color: #06b6d4;"><i class="fa-solid fa-user-graduate"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-info">
                        <div class="stat-card-label">Active Teachers</div>
                        <div class="stat-card-value" id="stat-teachers">0</div>
                    </div>
                    <div class="stat-card-icon" style="background: rgba(236,72,153,0.1); color: var(--accent);"><i class="fa-solid fa-chalkboard-user"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-info">
                        <div class="stat-card-label">Class Sections</div>
                        <div class="stat-card-value" id="stat-classes">0</div>
                    </div>
                    <div class="stat-card-icon" style="background: rgba(16,185,129,0.1); color: var(--success);"><i class="fa-solid fa-school"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-info">
                        <div class="stat-card-label">Curriculum Subjects</div>
                        <div class="stat-card-value" id="stat-subjects">0</div>
                    </div>
                    <div class="stat-card-icon" style="background: rgba(79,70,229,0.1); color: var(--primary);"><i class="fa-solid fa-book"></i></div>
                </div>
            </div>

            <div class="admin-flex-row anim-slide-up" style="margin-top: 24px;">
                <!-- Post notice form -->
                <div class="glass-card" style="padding: 24px;">
                    <h3 style="font-weight: 700; margin-bottom: 16px; color: var(--primary);">Publish Announcement</h3>
                    <form id="notice-form">
                        <div class="form-group">
                            <label class="form-label" for="title">Notice Title</label>
                            <input type="text" id="title" class="form-control" required placeholder="e.g. Winter vacation holiday schedule">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="content">Announcement Content</label>
                            <textarea id="content" class="form-control" style="height: 100px;" required placeholder="Detailed message details..."></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="audience">Target Audience</label>
                            <select id="audience" class="form-control" required>
                                <option value="all">All Roles</option>
                                <option value="teachers">Teachers Only</option>
                                <option value="students">Students Only</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Publish Announcement</button>
                    </form>
                </div>

                <!-- Notices timeline list -->
                <div class="glass-card" style="padding: 24px;">
                    <h3 style="font-weight: 700; margin-bottom: 16px;">Active notices Timeline</h3>
                    <div class="notice-timeline" id="notices-list" style="max-height: 400px; overflow-y: auto; padding-right: 8px;">
                        <!-- JS items rendering -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-display-name').textContent = sanitize(window.current_user.username);
            renderDashboard();

            // Submit notice form
            document.getElementById('notice-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const title = document.getElementById('title').value.trim();
                const content = document.getElementById('content').value.trim();
                const audience = document.getElementById('audience').value;

                const notices = db.getCollection(window.DB_KEYS.NOTICES);
                notices.push({
                    id: Date.now(),
                    title: title,
                    content: content,
                    target_audience: audience,
                    created_by: 'Admin',
                    date: new Date().toISOString().split('T')[0]
                });
                db.saveCollection(window.DB_KEYS.NOTICES, notices);

                alert('Announcement published successfully!');
                document.getElementById('notice-form').reset();
                renderDashboard();
            });
        });

        function renderDashboard() {
            const students = db.getCollection(window.DB_KEYS.STUDENTS).filter(s => s.status === 'active');
            const teachers = db.getCollection(window.DB_KEYS.TEACHERS).filter(t => t.status === 'active');
            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const subjects = db.getCollection(window.DB_KEYS.SUBJECTS);

            document.getElementById('stat-students').textContent = students.length;
            document.getElementById('stat-teachers').textContent = teachers.length;
            document.getElementById('stat-classes').textContent = classes.length;
            document.getElementById('stat-subjects').textContent = subjects.length;

            // Render notices
            const notices = db.getCollection(window.DB_KEYS.NOTICES).reverse();
            const noticesContainer = document.getElementById('notices-list');

            if (notices.length > 0) {
                noticesContainer.innerHTML = notices.map(n => `
                    <div class="notice-timeline-item">
                        <div class="notice-timeline-marker"></div>
                        <div class="notice-timeline-content" style="position: relative;">
                            <button onclick="deleteNotice(${n.id})" style="position: absolute; top: 12px; right: 12px; border: none; background: none; color: var(--danger); cursor: pointer; font-size: 0.9rem;" title="Delete announcement">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                            <div class="notice-timeline-header">
                                <h4 class="notice-timeline-title">${sanitize(n.title)}</h4>
                                <span class="notice-timeline-date">${sanitize(n.date)}</span>
                            </div>
                            <p class="notice-timeline-body">${sanitize(n.content)}</p>
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">
                                <span><i class="fa-solid fa-users"></i> Audience: ${sanitize(n.target_audience)}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                noticesContainer.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 24px;">No notices posted.</div>';
            }
        }

        function deleteNotice(id) {
            if (!confirm('Are you sure you want to delete this notice?')) return;
            const notices = db.getCollection(window.DB_KEYS.NOTICES);
            const filtered = notices.filter(n => n.id !== id);
            db.saveCollection(window.DB_KEYS.NOTICES, filtered);
            renderDashboard();
        }
    </script>
</body>
</html>
