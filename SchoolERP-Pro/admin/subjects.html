<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Subjects | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        .subject-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 24px;
        }
        @media (max-width: 992px) {
            .subject-grid {
                grid-template-columns: 1fr;
            }
        }
        .form-row-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-user-shield"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Administrator</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item-link">
                    <i class="fa-solid fa-user-graduate"></i> Students
                </a>
                <a href="teachers.html" class="nav-item-link">
                    <i class="fa-solid fa-chalkboard-user"></i> Teachers
                </a>
                <a href="classes.html" class="nav-item-link">
                    <i class="fa-solid fa-school"></i> Classes
                </a>
                <a href="subjects.html" class="nav-item-link active">
                    <i class="fa-solid fa-book"></i> Subjects
                </a>
                <a href="attendance.html" class="nav-item-link">
                    <i class="fa-solid fa-calendar-check"></i> Attendance
                </a>
                <a href="marks.html" class="nav-item-link">
                    <i class="fa-solid fa-file-signature"></i> Marks
                </a>
                <a href="results.html" class="nav-item-link">
                    <i class="fa-solid fa-square-poll-vertical"></i> Results
                </a>
                <a href="certificates.html" class="nav-item-link">
                    <i class="fa-solid fa-award"></i> Certificates
                </a>
                <a href="reports.html" class="nav-item-link">
                    <i class="fa-solid fa-chart-line"></i> Reports
                </a>
                <a href="settings.html" class="nav-item-link">
                    <i class="fa-solid fa-sliders"></i> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">Subjects & Course Mappings</h1>
                </div>
            </header>

            <div class="subject-grid anim-slide-up">
                <!-- Add Subject & Assign Form -->
                <div>
                    <!-- Form 1: Add Subject -->
                    <div class="glass-card" style="padding: 24px; margin-bottom: 24px;">
                        <h3 style="font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; color: var(--primary);">Create New Subject</h3>
                        <form id="subject-form">
                            <div class="form-row-2">
                                <div class="form-group">
                                    <label class="form-label" for="subject_name">Subject Name</label>
                                    <input type="text" id="subject_name" class="form-control" required placeholder="e.g. Mathematics">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="subject_code">Subject Code</label>
                                    <input type="text" id="subject_code" class="form-control" required placeholder="e.g. MATH101">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Create Subject</button>
                        </form>
                    </div>

                    <!-- Form 2: Assign Course -->
                    <div class="glass-card" style="padding: 24px;">
                        <h3 style="font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; color: var(--accent);">Assign Teacher to Class</h3>
                        <form id="assignment-form">
                            <div class="form-group">
                                <label class="form-label" for="assign_class_id">Select Class Section</label>
                                <select id="assign_class_id" class="form-control" required>
                                    <option value="">Select Class</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="assign_subject_id">Select Subject</label>
                                <select id="assign_subject_id" class="form-control" required>
                                    <option value="">Select Subject</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="assign_teacher_id">Select Instructor</label>
                                <select id="assign_teacher_id" class="form-control" required>
                                    <option value="">Select Teacher</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-accent btn-block">Create Subject Mapping</button>
                        </form>
                    </div>
                </div>

                <!-- Subjects & Assignments lists -->
                <div class="glass-card" style="padding: 24px;">
                    <h3 style="font-weight: 700; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">Mapped Subjects Mappings</h3>
                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th>Class</th>
                                    <th>Subject</th>
                                    <th>Instructor</th>
                                    <th style="text-align: right;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="assignments-list">
                                <!-- Dynamic dynamic loops -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-display-name').textContent = sanitize(window.current_user.username);
            populateSelectors();
            renderMappings();

            // Submit subject creation
            document.getElementById('subject-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('subject_name').value.trim();
                const code = document.getElementById('subject_code').value.trim();

                const subjects = db.getCollection(window.DB_KEYS.SUBJECTS);
                const exists = subjects.some(s => s.subject_code.toLowerCase() === code.toLowerCase());
                if (exists) {
                    alert('Subject code already registered.');
                    return;
                }

                subjects.push({
                    id: Date.now(),
                    subject_name: name,
                    subject_code: code
                });
                db.saveCollection(window.DB_KEYS.SUBJECTS, subjects);
                alert('Subject created successfully!');
                document.getElementById('subject-form').reset();
                populateSelectors();
            });

            // Submit course mapping assignment
            document.getElementById('assignment-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const classId = parseInt(document.getElementById('assign_class_id').value);
                const subjectId = parseInt(document.getElementById('assign_subject_id').value);
                const teacherId = parseInt(document.getElementById('assign_teacher_id').value);

                const assignments = db.getCollection(window.DB_KEYS.ASSIGNMENTS);
                const exists = assignments.some(a => Number(a.class_id) === Number(classId) && Number(a.subject_id) === Number(subjectId) && Number(a.teacher_id) === Number(teacherId));
                
                if (exists) {
                    alert('Subject assignment mapping already exists.');
                    return;
                }

                assignments.push({
                    id: Date.now(),
                    class_id: classId,
                    subject_id: subjectId,
                    teacher_id: teacherId
                });
                db.saveCollection(window.DB_KEYS.ASSIGNMENTS, assignments);
                alert('Assignment created successfully!');
                document.getElementById('assignment-form').reset();
                renderMappings();
            });
        });

        function populateSelectors() {
            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const subjects = db.getCollection(window.DB_KEYS.SUBJECTS);
            const teachers = db.getCollection(window.DB_KEYS.TEACHERS);

            // Classes select
            const clSelect = document.getElementById('assign_class_id');
            clSelect.innerHTML = '<option value="">Select Class</option>';
            classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = `${c.class_name} - ${c.section}`;
                clSelect.appendChild(opt);
            });

            // Subjects select
            const subSelect = document.getElementById('assign_subject_id');
            subSelect.innerHTML = '<option value="">Select Subject</option>';
            subjects.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = `${s.subject_name} (${s.subject_code})`;
                subSelect.appendChild(opt);
            });

            // Teachers select
            const tSelect = document.getElementById('assign_teacher_id');
            tSelect.innerHTML = '<option value="">Select Teacher</option>';
            teachers.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = sanitize(t.name);
                tSelect.appendChild(opt);
            });
        }

        function renderMappings() {
            const assignments = db.getCollection(window.DB_KEYS.ASSIGNMENTS);
            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const subjects = db.getCollection(window.DB_KEYS.SUBJECTS);
            const teachers = db.getCollection(window.DB_KEYS.TEACHERS);
            const container = document.getElementById('assignments-list');

            if (assignments.length > 0) {
                container.innerHTML = assignments.map(a => {
                    const cls = classes.find(c => Number(c.id) === Number(a.class_id));
                    const sub = subjects.find(s => s.id === a.subject_id);
                    const t = teachers.find(item => item.id === a.teacher_id);

                    return `
                        <tr>
                            <td style="font-weight: 600;">${sanitize(cls ? `${cls.class_name}-${cls.section}` : 'N/A')}</td>
                            <td style="font-weight: 600;">${sanitize(sub ? `${sub.subject_name} (${sub.subject_code})` : 'N/A')}</td>
                            <td style="font-weight: 600;">${sanitize(t ? t.name : 'N/A')}</td>
                            <td style="text-align: right;">
                                <button class="btn btn-xs btn-danger" onclick="deleteAssignment(${a.id})"><i class="fa-solid fa-trash-can"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } else {
                container.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 24px;">No mapping assignments found.</td></tr>';
            }
        }

        function deleteAssignment(id) {
            if (!confirm('Are you sure you want to delete this course mapping assignment?')) return;
            const assignments = db.getCollection(window.DB_KEYS.ASSIGNMENTS);
            const filtered = assignments.filter(a => a.id !== id);
            db.saveCollection(window.DB_KEYS.ASSIGNMENTS, filtered);
            renderMappings();
        }
    </script>
</body>
</html>
