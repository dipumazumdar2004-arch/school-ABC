<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Classes | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #ffffff;
            color: #1e293b;
            padding: 32px;
            border-radius: var(--border-radius);
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 45px rgba(0,0,0,0.15);
        }
        .class-split-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 24px;
        }
        @media (max-width: 992px) {
            .class-split-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-user-shield"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Administrator</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item-link">
                    <i class="fa-solid fa-user-graduate"></i> Students
                </a>
                <a href="teachers.html" class="nav-item-link">
                    <i class="fa-solid fa-chalkboard-user"></i> Teachers
                </a>
                <a href="classes.html" class="nav-item-link active">
                    <i class="fa-solid fa-school"></i> Classes
                </a>
                <a href="subjects.html" class="nav-item-link">
                    <i class="fa-solid fa-book"></i> Subjects
                </a>
                <a href="attendance.html" class="nav-item-link">
                    <i class="fa-solid fa-calendar-check"></i> Attendance
                </a>
                <a href="marks.html" class="nav-item-link">
                    <i class="fa-solid fa-file-signature"></i> Marks
                </a>
                <a href="results.html" class="nav-item-link">
                    <i class="fa-solid fa-square-poll-vertical"></i> Results
                </a>
                <a href="certificates.html" class="nav-item-link">
                    <i class="fa-solid fa-award"></i> Certificates
                </a>
                <a href="reports.html" class="nav-item-link">
                    <i class="fa-solid fa-chart-line"></i> Reports
                </a>
                <a href="settings.html" class="nav-item-link">
                    <i class="fa-solid fa-sliders"></i> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">Classroom Configuration</h1>
                </div>
            </header>

            <div class="class-split-layout anim-slide-up">
                <!-- Add New Class Form -->
                <div class="glass-card" style="padding: 24px;">
                    <h3 style="font-weight: 700; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; color: var(--primary);">Create Academic Class</h3>
                    <form id="class-form">
                        <div class="form-group">
                            <label class="form-label" for="class_name">Class Name / Standard</label>
                            <input type="text" id="class_name" class="form-control" required placeholder="e.g. Grade 10">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="section">Section Identifier</label>
                            <input type="text" id="section" class="form-control" required placeholder="e.g. A">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="class_teacher_id">Class Teacher Mentor</label>
                            <select id="class_teacher_id" class="form-control" required>
                                <option value="">Select Mentor</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Add Class Section</button>
                    </form>
                </div>

                <!-- Classes Grid Listing -->
                <div class="glass-card" style="padding: 24px;">
                    <h3 style="font-weight: 700; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">Active Academic Classes</h3>
                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th>Class Name</th>
                                    <th>Section</th>
                                    <th>Class Teacher</th>
                                    <th style="text-align: right;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="classes-list">
                                <!-- Dynamic rendering -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-display-name').textContent = sanitize(window.current_user.username);
            
            // Populate teacher selection options
            const teachers = db.getCollection(window.DB_KEYS.TEACHERS);
            const selectEl = document.getElementById('class_teacher_id');
            teachers.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = sanitize(t.name);
                selectEl.appendChild(opt);
            });

            renderClasses();

            // Submit handler
            document.getElementById('class-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('class_name').value.trim();
                const section = document.getElementById('section').value.trim();
                const teacherId = parseInt(document.getElementById('class_teacher_id').value);

                const classes = db.getCollection(window.DB_KEYS.CLASSES);
                
                // Duplicate check
                const exists = classes.some(c => c.class_name.toLowerCase() === name.toLowerCase() && c.section.toLowerCase() === section.toLowerCase());
                if (exists) {
                    alert('Class Section configuration already exists.');
                    return;
                }

                classes.push({
                    id: Date.now(),
                    class_name: name,
                    section: section,
                    class_teacher_id: teacherId
                });

                db.saveCollection(window.DB_KEYS.CLASSES, classes);
                alert('Class Section created successfully!');
                document.getElementById('class-form').reset();
                renderClasses();
            });
        });

        function renderClasses() {
            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const teachers = db.getCollection(window.DB_KEYS.TEACHERS);
            const container = document.getElementById('classes-list');

            if (classes.length > 0) {
                container.innerHTML = classes.map(c => {
                    const teacher = teachers.find(t => t.id === c.class_teacher_id);
                    return `
                        <tr>
                            <td style="font-weight: 600;">${sanitize(c.class_name)}</td>
                            <td><span class="badge badge-info">${sanitize(c.section)}</span></td>
                            <td style="font-weight: 600;">${sanitize(teacher ? teacher.name : 'N/A')}</td>
                            <td style="text-align: right;">
                                <button class="btn btn-xs btn-danger" onclick="deleteClass(${c.id})"><i class="fa-solid fa-trash-can"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } else {
                container.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 24px;">No classes configured.</td></tr>';
            }
        }

        function deleteClass(id) {
            if (!confirm('Are you sure you want to delete this class section configuration?')) return;
            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const filtered = classes.filter(c => c.id !== id);
            db.saveCollection(window.DB_KEYS.CLASSES, filtered);
            renderClasses();
        }
    </script>
</body>
</html>
