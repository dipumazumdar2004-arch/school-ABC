<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #ffffff;
            color: #1e293b;
            padding: 32px;
            border-radius: var(--border-radius);
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 45px rgba(0,0,0,0.15);
            max-height: 85vh;
            overflow-y: auto;
        }
        .form-row-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-user-shield"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Administrator</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item-link active">
                    <i class="fa-solid fa-user-graduate"></i> Students
                </a>
                <a href="teachers.html" class="nav-item-link">
                    <i class="fa-solid fa-chalkboard-user"></i> Teachers
                </a>
                <a href="classes.html" class="nav-item-link">
                    <i class="fa-solid fa-school"></i> Classes
                </a>
                <a href="subjects.html" class="nav-item-link">
                    <i class="fa-solid fa-book"></i> Subjects
                </a>
                <a href="attendance.html" class="nav-item-link">
                    <i class="fa-solid fa-calendar-check"></i> Attendance
                </a>
                <a href="marks.html" class="nav-item-link">
                    <i class="fa-solid fa-file-signature"></i> Marks
                </a>
                <a href="results.html" class="nav-item-link">
                    <i class="fa-solid fa-square-poll-vertical"></i> Results
                </a>
                <a href="certificates.html" class="nav-item-link">
                    <i class="fa-solid fa-award"></i> Certificates
                </a>
                <a href="reports.html" class="nav-item-link">
                    <i class="fa-solid fa-chart-line"></i> Reports
                </a>
                <a href="settings.html" class="nav-item-link">
                    <i class="fa-solid fa-sliders"></i> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">Student Admissions Directory</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="openStudentModal()">
                        <i class="fa-solid fa-user-plus"></i> New Student Admission
                    </button>
                </div>
            </header>

            <!-- Table Card -->
            <div class="glass-card anim-slide-up">
                <div class="card-header">
                    <h3 class="card-title">Enrolled Students</h3>
                    <i class="fa-solid fa-graduation-cap text-muted"></i>
                </div>
                <div class="card-body" style="padding: 0;">
                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th>Admission No</th>
                                    <th>Roll No</th>
                                    <th>Name</th>
                                    <th>Class Section</th>
                                    <th>Guardian Name</th>
                                    <th>Phone</th>
                                    <th>Status</th>
                                    <th style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="students-table-body">
                                <!-- Dynamic dynamic rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Student Modal -->
    <div class="modal" id="student-modal">
        <div class="modal-content glass-card" style="background: #ffffff; color: #1e293b;">
            <h3 style="font-weight: 700; margin-bottom: 24px; color: var(--primary);" id="modal-title">Student Admission Form</h3>
            <form id="student-form">
                <input type="hidden" id="student-id">
                
                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="admission_no">Admission No</label>
                        <input type="text" id="admission_no" class="form-control" required placeholder="e.g. ADM2026005">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="roll_no">Roll Number</label>
                        <input type="number" id="roll_no" class="form-control" required placeholder="e.g. 105">
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="name">Full Student Name</label>
                        <input type="text" id="name" class="form-control" required placeholder="e.g. Alice Johnson">
                    </div>
                    <div class="form-group" style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 8px;">
                        <div>
                            <label class="form-label" for="class_select">Class Standard</label>
                            <select id="class_select" class="form-control" required>
                                <option value="">Select Class</option>
                                <option value="Class 1">Class 1</option>
                                <option value="Class 2">Class 2</option>
                                <option value="Class 3">Class 3</option>
                                <option value="Class 4">Class 4</option>
                                <option value="Class 5">Class 5</option>
                                <option value="Class 6">Class 6</option>
                                <option value="Class 7">Class 7</option>
                                <option value="Class 8">Class 8</option>
                                <option value="Class 9">Class 9</option>
                                <option value="Class 10">Class 10</option>
                                <option value="Class 11">Class 11</option>
                                <option value="Class 12">Class 12</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label" for="section_input">Section</label>
                            <input type="text" id="section_input" class="form-control" required placeholder="e.g. A" maxlength="5">
                        </div>
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="username">Portal Username</label>
                        <input type="text" id="username" class="form-control" required placeholder="e.g. alicej">
                    </div>
                    <div class="form-group" id="pass-group">
                        <label class="form-label" for="password">Account Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Defaults to username123 if blank">
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="e.g. alice@gmail.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="phone">Personal Phone</label>
                        <input type="text" id="phone" class="form-control" placeholder="e.g. +1 555 0199">
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="dob">Date of Birth</label>
                        <input type="date" id="dob" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="gender">Gender</label>
                        <select id="gender" class="form-control" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="guardian_name">Guardian Name</label>
                        <input type="text" id="guardian_name" class="form-control" placeholder="Father or Mother name">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="guardian_phone">Guardian Contact</label>
                        <input type="text" id="guardian_phone" class="form-control" placeholder="Phone contact">
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="prev_percentage">Previous Class Annual Percentage (%)</label>
                        <input type="number" step="0.01" min="0" max="100" id="prev_percentage" class="form-control" placeholder="e.g. 84.50">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="address">Full Residential Address</label>
                    <textarea id="address" class="form-control" style="height: 50px;" placeholder="Full street address details..."></textarea>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
                    <button type="button" class="btn btn-secondary" onclick="closeStudentModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Admissions Details</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-display-name').textContent = sanitize(window.current_user.username);
            

            renderStudents();

            // Form submit handler
            document.getElementById('student-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveStudent();
            });
        });

        function renderStudents() {
            const students = db.getCollection(window.DB_KEYS.STUDENTS);
            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const container = document.getElementById('students-table-body');

            if (students.length > 0) {
                container.innerHTML = students.map(s => {
                    const cls = classes.find(c => Number(c.id) === Number(s.class_id));
                    let badgeClass = s.status === 'active' ? 'badge-success' : 'badge-danger';
                    return `
                        <tr>
                            <td><span class="badge badge-info">${sanitize(s.admission_no)}</span></td>
                            <td><strong>${s.roll_no}</strong></td>
                            <td style="font-weight: 600;">${sanitize(s.name)}</td>
                            <td style="font-weight: 600;">${sanitize(cls ? `${cls.class_name}-${cls.section}` : 'Unassigned')}</td>
                            <td>${sanitize(s.guardian_name || '-')}</td>
                            <td>${sanitize(s.phone || '-')}</td>
                            <td><span class="badge ${badgeClass}">${s.status}</span></td>
                            <td style="text-align: right;">
                                <button class="btn btn-xs btn-primary" style="margin-right: 4px;" onclick="editStudent(${s.id})"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="btn btn-xs btn-danger" onclick="deleteStudent(${s.id})"><i class="fa-solid fa-trash-can"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } else {
                container.innerHTML = '<tr><td colspan="8" style="text-align: center; color: var(--text-muted); padding: 40px;">No students enrolled yet.</td></tr>';
            }
        }

        function openStudentModal(id = null) {
            const modal = document.getElementById('student-modal');
            const titleEl = document.getElementById('modal-title');
            const form = document.getElementById('student-form');
            form.reset();

            if (id) {
                titleEl.textContent = 'Edit Student Details';
                document.getElementById('student-id').value = id;

                const students = db.getCollection(window.DB_KEYS.STUDENTS);
                const s = students.find(item => item.id === id);
                const users = db.getCollection(window.DB_KEYS.USERS);
                const u = users.find(item => item.id === s.user_id);

                document.getElementById('admission_no').value = s.admission_no;
                document.getElementById('roll_no').value = s.roll_no;
                document.getElementById('name').value = s.name;
                const classes = db.getCollection(window.DB_KEYS.CLASSES);
                const cls = classes.find(c => Number(c.id) === Number(s.class_id));
                document.getElementById('class_select').value = cls ? cls.class_name : '';
                document.getElementById('section_input').value = cls ? cls.section : '';
                document.getElementById('prev_percentage').value = s.prev_percentage || '';

                document.getElementById('username').value = u.username;
                document.getElementById('email').value = u.email;
                document.getElementById('phone').value = s.phone;
                document.getElementById('dob').value = s.dob;
                document.getElementById('gender').value = s.gender;
                document.getElementById('guardian_name').value = s.guardian_name;
                document.getElementById('guardian_phone').value = s.guardian_phone;
                document.getElementById('address').value = s.address;
                
                document.getElementById('pass-group').style.display = 'none'; // Hide password edit for simplicity
            } else {
                titleEl.textContent = 'Student Admission Form';
                document.getElementById('student-id').value = '';
                document.getElementById('class_select').value = '';
                document.getElementById('section_input').value = '';
                document.getElementById('prev_percentage').value = '';
                document.getElementById('pass-group').style.display = 'block';
            }

            modal.style.display = 'flex';
        }

        function closeStudentModal() {
            document.getElementById('student-modal').style.display = 'none';
        }

        function saveStudent() {
            const idVal = document.getElementById('student-id').value;
            const admissionNo = document.getElementById('admission_no').value.trim();
            const rollNo = parseInt(document.getElementById('roll_no').value);
            const name = document.getElementById('name').value.trim();
            
            const classSelectVal = document.getElementById('class_select').value;
            const sectionVal = document.getElementById('section_input').value.trim();
            const prevPercentage = parseFloat(document.getElementById('prev_percentage').value) || 0;

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const dob = document.getElementById('dob').value;
            const gender = document.getElementById('gender').value;
            const guardianName = document.getElementById('guardian_name').value.trim();
            const guardianPhone = document.getElementById('guardian_phone').value.trim();
            const address = document.getElementById('address').value.trim();

            const students = db.getCollection(window.DB_KEYS.STUDENTS);
            const users = db.getCollection(window.DB_KEYS.USERS);

            // Dynamically resolve or create class record
            let classId = 0;
            if (classSelectVal && sectionVal) {
                const classes = db.getCollection(window.DB_KEYS.CLASSES);
                let matchedClass = classes.find(c => c.class_name.toLowerCase() === classSelectVal.toLowerCase() && c.section.toLowerCase() === sectionVal.toLowerCase());
                if (matchedClass) {
                    classId = matchedClass.id;
                } else {
                    classId = Date.now();
                    classes.push({
                        id: classId,
                        class_name: classSelectVal,
                        section: sectionVal,
                        class_teacher_id: 1 // Default assignment
                    });
                    db.saveCollection(window.DB_KEYS.CLASSES, classes);
                }
            }

            if (idVal) {
                // Update
                const id = parseInt(idVal);
                const sIdx = students.findIndex(s => s.id === id);
                if (sIdx !== -1) {
                    students[sIdx].admission_no = admissionNo;
                    students[sIdx].roll_no = rollNo;
                    students[sIdx].name = name;
                    students[sIdx].class_id = classId;
                    students[sIdx].prev_percentage = prevPercentage;
                    students[sIdx].phone = phone;
                    students[sIdx].dob = dob;
                    students[sIdx].gender = gender;
                    students[sIdx].guardian_name = guardianName;
                    students[sIdx].guardian_phone = guardianPhone;
                    students[sIdx].address = address;

                    const uIdx = users.findIndex(u => u.id === students[sIdx].user_id);
                    if (uIdx !== -1) {
                        users[uIdx].username = username;
                        users[uIdx].email = email;
                    }
                    db.saveCollection(window.DB_KEYS.STUDENTS, students);
                    db.saveCollection(window.DB_KEYS.USERS, users);
                }
            } else {
                // Add new
                const passVal = document.getElementById('password').value;
                const password = passVal !== '' ? passVal : `${username}123`;
                
                const newUserId = Date.now();
                users.push({
                    id: newUserId,
                    username: username,
                    password: password,
                    email: email,
                    role: 'student',
                    status: 'active'
                });

                students.push({
                    id: Date.now() + 1,
                    user_id: newUserId,
                    admission_no: admissionNo,
                    name: name,
                    roll_no: rollNo,
                    class_id: classId,
                    prev_percentage: prevPercentage,
                    dob: dob,
                    gender: gender,
                    blood_group: 'O+',
                    phone: phone,
                    address: address,
                    guardian_name: guardianName,
                    guardian_phone: guardianPhone,
                    admission_date: new Date().toISOString().split('T')[0],
                    status: 'active'
                });

                db.saveCollection(window.DB_KEYS.USERS, users);
                db.saveCollection(window.DB_KEYS.STUDENTS, students);
            }

            alert('Student saved successfully!');
            closeStudentModal();
            renderStudents();
        }

        function editStudent(id) {
            openStudentModal(id);
        }

        function deleteStudent(id) {
            if (!confirm('Are you sure you want to delete this student and their login credentials?')) return;
            const students = db.getCollection(window.DB_KEYS.STUDENTS);
            const users = db.getCollection(window.DB_KEYS.USERS);

            const studentObj = students.find(s => s.id === id);
            const filteredStudents = students.filter(s => s.id !== id);
            const filteredUsers = users.filter(u => u.id !== studentObj.user_id);

            db.saveCollection(window.DB_KEYS.STUDENTS, filteredStudents);
            db.saveCollection(window.DB_KEYS.USERS, filteredUsers);
            renderStudents();
        }
    </script>
</body>
</html>
