<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/teacher.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-chalkboard-user"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Educator</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="attendance.html" class="nav-item-link active">
                    <i class="fa-solid fa-calendar-check"></i> Mark Attendance
                </a>
                <a href="marks.html" class="nav-item-link">
                    <i class="fa-solid fa-file-signature"></i> Manage Marks
                </a>
                <a href="homework.html" class="nav-item-link">
                    <i class="fa-solid fa-book-open"></i> Homework Assignments
                </a>
                <a href="subjects.html" class="nav-item-link">
                    <i class="fa-solid fa-book"></i> My Subjects
                </a>
                <a href="profile.html" class="nav-item-link">
                    <i class="fa-solid fa-user"></i> My Profile
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">Mark Daily Attendance</h1>
                </div>
                <div class="header-right">
                    <button class="header-action-btn" id="theme-toggle-btn"><i class="fa-solid fa-moon" id="theme-toggle-icon"></i></button>
                </div>
            </header>

            <!-- Selection Filters -->
            <div class="glass-card anim-slide-up" style="padding: 24px; margin-bottom: 24px;">
                <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end;">
                    <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                        <label class="form-label" for="class_id">Select Class Section</label>
                        <select id="class_id" class="form-control" onchange="loadClassList()">
                            <option value="">Choose Class</option>
                            <!-- Rendered dynamically -->
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                        <label class="form-label" for="att_date">Attendance Date</label>
                        <input type="date" id="att_date" class="form-control" value="">
                    </div>
                    <button class="btn btn-primary" onclick="loadClassList()" style="height: 48px;">
                        <i class="fa-solid fa-magnifying-glass"></i> Load List
                    </button>
                </div>
            </div>

            <!-- Attendance Register Card -->
            <div class="glass-card anim-slide-up" id="register-card" style="display: none; padding: 32px;">
                <div class="card-header" style="margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);">
                    <h3 class="card-title" id="class-title">Attendance Sheet</h3>
                    <button class="btn btn-primary" onclick="saveAttendance()">Save Attendance Register</button>
                </div>
                <div class="table-responsive">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th>Roll No</th>
                                <th>Admission No</th>
                                <th>Student Name</th>
                                <th>Status Option</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody id="student-list">
                            <!-- Dynamic rendering -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-display-name').textContent = sanitize(window.profile_details.name);
            document.getElementById('att_date').value = new Date().toISOString().split('T')[0];

            // Load teacher classes
            const teacherId = window.profile_details.id;
            const assignments = db.getCollection(window.DB_KEYS.ASSIGNMENTS);
            const myAssignments = assignments.filter(a => a.teacher_id === teacherId);
            const classes = db.getCollection(window.DB_KEYS.CLASSES);

            const uniqueClassIds = [...new Set(myAssignments.map(a => a.class_id))];
            const selectEl = document.getElementById('class_id');

            uniqueClassIds.forEach(cid => {
                const cls = classes.find(c => c.id === cid);
                if (cls) {
                    const opt = document.createElement('option');
                    opt.value = cls.id;
                    opt.textContent = `${cls.class_name} - ${cls.section}`;
                    selectEl.appendChild(opt);
                }
            });
        });

        function loadClassList() {
            const classId = parseInt(document.getElementById('class_id').value);
            const date = document.getElementById('att_date').value;

            if (!classId || !date) {
                alert('Please select a class and date.');
                return;
            }

            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const activeClass = classes.find(c => c.id === classId);
            document.getElementById('class-title').textContent = `Attendance Sheet: ${activeClass.class_name} - ${activeClass.section} (${date})`;

            const students = db.getCollection(window.DB_KEYS.STUDENTS);
            const classStudents = students.filter(s => Number(s.class_id) === Number(classId) && s.status === 'active').sort((a,b) => a.roll_no - b.roll_no);

            const attendance = db.getCollection(window.DB_KEYS.ATTENDANCE);
            const existingAtt = attendance.filter(a => Number(a.class_id) === Number(classId) && a.date === date);

            const container = document.getElementById('student-list');
            if (classStudents.length > 0) {
                container.innerHTML = classStudents.map(s => {
                    const attRecord = existingAtt.find(a => a.student_id === s.id);
                    const currentStatus = attRecord ? attRecord.status : 'Present';
                    const currentRemarks = attRecord ? attRecord.remarks : '';

                    return `
                        <tr data-student-id="${s.id}">
                            <td><strong>${s.roll_no}</strong></td>
                            <td><span class="badge badge-info">${sanitize(s.admission_no)}</span></td>
                            <td style="font-weight: 600;">${sanitize(s.name)}</td>
                            <td>
                                <select class="form-control att-status-select" style="width: 140px; padding: 4px 8px; height: 32px;">
                                    <option value="Present" ${currentStatus === 'Present' ? 'selected' : ''}>Present</option>
                                    <option value="Absent" ${currentStatus === 'Absent' ? 'selected' : ''}>Absent</option>
                                    <option value="Late" ${currentStatus === 'Late' ? 'selected' : ''}>Late</option>
                                    <option value="Excused" ${currentStatus === 'Excused' ? 'selected' : ''}>Excused</option>
                                </select>
                            </td>
                            <td>
                                <input type="text" class="form-control att-remarks-input" style="height: 32px;" value="${sanitize(currentRemarks)}" placeholder="Optional remarks">
                            </td>
                        </tr>
                    `;
                }).join('');
                document.getElementById('register-card').style.display = 'block';
            } else {
                container.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 24px;">No active students enrolled in this class.</td></tr>';
                document.getElementById('register-card').style.display = 'block';
            }
        }

        function saveAttendance() {
            const classId = parseInt(document.getElementById('class_id').value);
            const date = document.getElementById('att_date').value;

            if (!classId || !date) return;

            const attendance = db.getCollection(window.DB_KEYS.ATTENDANCE);
            // Remove existing registers logs for this class/date
            let filtered = attendance.filter(a => !(Number(a.class_id) === Number(classId) && a.date === date));

            const rows = document.querySelectorAll('#student-list tr[data-student-id]');
            rows.forEach(row => {
                const studentId = parseInt(row.getAttribute('data-student-id'));
                const status = row.querySelector('.att-status-select').value;
                const remarks = row.querySelector('.att-remarks-input').value.trim();

                filtered.push({
                    id: Date.now() + Math.random(),
                    student_id: studentId,
                    class_id: classId,
                    date: date,
                    status: status,
                    remarks: remarks
                });
            });

            db.saveCollection(window.DB_KEYS.ATTENDANCE, filtered);
            alert('Attendance sheet registers saved successfully!');
            loadClassList();
        }
    </script>
</body>
</html>
