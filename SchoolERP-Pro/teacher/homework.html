<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework Panel | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/teacher.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #ffffff;
            color: #1e293b;
            padding: 32px;
            border-radius: var(--border-radius);
            max-width: 480px;
            width: 90%;
            box-shadow: 0 10px 45px rgba(0,0,0,0.15);
        }
        .hw-split-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 992px) {
            .hw-split-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-chalkboard-user"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Educator</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="attendance.html" class="nav-item-link">
                    <i class="fa-solid fa-calendar-check"></i> Mark Attendance
                </a>
                <a href="marks.html" class="nav-item-link">
                    <i class="fa-solid fa-file-signature"></i> Manage Marks
                </a>
                <a href="homework.html" class="nav-item-link active">
                    <i class="fa-solid fa-book-open"></i> Homework Assignments
                </a>
                <a href="subjects.html" class="nav-item-link">
                    <i class="fa-solid fa-book"></i> My Subjects
                </a>
                <a href="profile.html" class="nav-item-link">
                    <i class="fa-solid fa-user"></i> My Profile
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">Homework Portal</h1>
                </div>
                <div class="header-right">
                    <button class="header-action-btn" id="theme-toggle-btn"><i class="fa-solid fa-moon" id="theme-toggle-icon"></i></button>
                </div>
            </header>

            <div class="hw-split-layout anim-slide-up">
                <!-- Assign New Task Form -->
                <div class="glass-card" style="padding: 32px;">
                    <h3 style="font-weight: 700; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; color: var(--primary);">Assign Homework Task</h3>
                    <form id="assign-homework-form">
                        <div class="form-group">
                            <label class="form-label" for="class_id">Target Class Section</label>
                            <select id="class_id" class="form-control" required onchange="updateSubjectsList()">
                                <option value="">Choose Class</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="subject_id">Subject Curriculum</label>
                            <select id="subject_id" class="form-control" required>
                                <option value="">Choose Subject</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="title">Task Title</label>
                            <input type="text" id="title" class="form-control" required placeholder="e.g. Quadratic equations worksheet">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="description">Detailed Description</label>
                            <textarea id="description" class="form-control" style="height: 80px;" placeholder="Outline exercise page instructions..."></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="due_date">Due Date Deadline</label>
                            <input type="date" id="due_date" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Assign Homework</button>
                    </form>
                </div>

                <!-- Review and Grade Submissions Panel -->
                <div class="glass-card" style="padding: 32px;">
                    <h3 style="font-weight: 700; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; color: var(--accent);">Student Submissions Review</h3>
                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th>Student</th>
                                    <th>Class</th>
                                    <th>Task Title</th>
                                    <th>Status</th>
                                    <th style="text-align: right;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="submissions-list">
                                <!-- Dynamic rendering -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Grade Modal -->
    <div class="modal" id="grade-modal">
        <div class="modal-content glass-card" style="background: #ffffff; color: #1e293b;">
            <h3 style="font-weight: 700; margin-bottom: 16px; color: var(--primary);">Grade Submission</h3>
            <form id="grade-submission-form">
                <input type="hidden" id="modal-submission-id">
                <div class="form-group">
                    <label class="form-label" for="obtained_marks">Marks Obtained (Scale 0-10)</label>
                    <input type="number" step="0.5" id="obtained_marks" class="form-control" required min="0" max="10">
                </div>
                <div class="form-group">
                    <label class="form-label" for="feedback">Teacher Feedback Remarks</label>
                    <textarea id="feedback" class="form-control" placeholder="Optional comments..."></textarea>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
                    <button type="button" class="btn btn-secondary" onclick="closeGradeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit Grade</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const teacherId = window.profile_details.id;
            document.getElementById('user-display-name').textContent = sanitize(window.profile_details.name);
            document.getElementById('due_date').value = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]; // Default: current date + 7 days

            // Populate class selections
            const assignments = db.getCollection(window.DB_KEYS.ASSIGNMENTS);
            const myAssignments = assignments.filter(a => a.teacher_id === teacherId);
            const classes = db.getCollection(window.DB_KEYS.CLASSES);

            const uniqueClassIds = [...new Set(myAssignments.map(a => a.class_id))];
            const selectEl = document.getElementById('class_id');

            uniqueClassIds.forEach(cid => {
                const cls = classes.find(c => c.id === cid);
                if (cls) {
                    const opt = document.createElement('option');
                    opt.value = cls.id;
                    opt.textContent = `${cls.class_name} - ${cls.section}`;
                    selectEl.appendChild(opt);
                }
            });

            renderSubmissions();

            // Handle assign task form submit
            document.getElementById('assign-homework-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const classId = parseInt(document.getElementById('class_id').value);
                const subjectId = parseInt(document.getElementById('subject_id').value);
                const title = document.getElementById('title').value.trim();
                const description = document.getElementById('description').value.trim();
                const dueDate = document.getElementById('due_date').value;

                const homework = db.getCollection(window.DB_KEYS.HOMEWORK);
                homework.push({
                    id: Date.now(),
                    class_id: classId,
                    subject_id: subjectId,
                    teacher_id: teacherId,
                    title: title,
                    description: description,
                    assigned_date: new Date().toISOString().split('T')[0],
                    due_date: dueDate,
                    file_path: ''
                });
                db.saveCollection(window.DB_KEYS.HOMEWORK, homework);

                alert('Homework assigned successfully!');
                document.getElementById('assign-homework-form').reset();
                document.getElementById('due_date').value = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                renderSubmissions();
            });

            // Handle grading form submit
            document.getElementById('grade-submission-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const submissionId = parseInt(document.getElementById('modal-submission-id').value);
                const marks = parseFloat(document.getElementById('obtained_marks').value);
                const feedback = document.getElementById('feedback').value.trim();

                const submissions = db.getCollection(window.DB_KEYS.SUBMISSIONS);
                const sIdx = submissions.findIndex(s => s.id === submissionId);
                if (sIdx !== -1) {
                    submissions[sIdx].marks_obtained = marks;
                    submissions[sIdx].remarks = feedback;
                    submissions[sIdx].status = 'Graded';
                    db.saveCollection(window.DB_KEYS.SUBMISSIONS, submissions);
                    
                    alert('Submission graded successfully!');
                    closeGradeModal();
                    renderSubmissions();
                }
            });
        });

        function updateSubjectsList() {
            const classId = parseInt(document.getElementById('class_id').value);
            const teacherId = window.profile_details.id;

            const assignments = db.getCollection(window.DB_KEYS.ASSIGNMENTS);
            const classAssigned = assignments.filter(a => Number(a.class_id) === Number(classId) && Number(a.teacher_id) === Number(teacherId));
            const subjects = db.getCollection(window.DB_KEYS.SUBJECTS);
            
            const subSelect = document.getElementById('subject_id');
            subSelect.innerHTML = '<option value="">Choose Subject</option>';

            classAssigned.forEach(a => {
                const sub = subjects.find(s => s.id === a.subject_id);
                if (sub) {
                    const opt = document.createElement('option');
                    opt.value = sub.id;
                    opt.textContent = `${sub.subject_name} (${sub.subject_code})`;
                    subSelect.appendChild(opt);
                }
            });
        }

        function renderSubmissions() {
            const teacherId = window.profile_details.id;
            const homework = db.getCollection(window.DB_KEYS.HOMEWORK);
            const myHomeworkIds = homework.filter(h => h.teacher_id === teacherId).map(h => h.id);

            const submissions = db.getCollection(window.DB_KEYS.SUBMISSIONS);
            const mySubmissions = submissions.filter(s => myHomeworkIds.includes(s.homework_id)).reverse();

            const students = db.getCollection(window.DB_KEYS.STUDENTS);
            const classes = db.getCollection(window.DB_KEYS.CLASSES);

            const container = document.getElementById('submissions-list');
            if (mySubmissions.length > 0) {
                container.innerHTML = mySubmissions.map(s => {
                    const hw = homework.find(h => h.id === s.homework_id);
                    const stu = students.find(st => st.id === s.student_id);
                    const cls = classes.find(c => Number(c.id) === Number(stu.class_id));

                    let badgeClass = s.status === 'Graded' ? 'badge-success' : 'badge-info';
                    let actionHtml = s.status === 'Graded' 
                        ? `<span class="text-success"><i class="fa-solid fa-circle-check"></i> Graded (${s.marks_obtained})</span>`
                        : `<button class="btn btn-xs btn-accent" onclick="openGradeModal(${s.id})">Grade</button>`;

                    return `
                        <tr>
                            <td style="font-weight: 600;">${sanitize(stu ? stu.name : 'N/A')}</td>
                            <td>${sanitize(cls ? `${cls.class_name}-${cls.section}` : 'N/A')}</td>
                            <td style="font-weight: 600;">${sanitize(hw ? hw.title : 'N/A')}</td>
                            <td><span class="badge ${badgeClass}">${s.status}</span></td>
                            <td style="text-align: right;">${actionHtml}</td>
                        </tr>
                    `;
                }).join('');
            } else {
                container.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 24px;">No homework solutions uploaded yet.</td></tr>';
            }
        }

        function openGradeModal(id) {
            document.getElementById('modal-submission-id').value = id;
            document.getElementById('grade-modal').style.display = 'flex';
        }

        function closeGradeModal() {
            document.getElementById('grade-modal').style.display = 'none';
            document.getElementById('grade-submission-form').reset();
        }
    </script>
</body>
</html>
