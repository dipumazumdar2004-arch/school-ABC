<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/teacher.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 992px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
        }
        .profile-header-card {
            text-align: center;
            padding: 40px 24px;
        }
        .profile-avatar-large {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #ffffff;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .profile-meta-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .profile-meta-row:last-child {
            border-bottom: none;
        }
        .profile-meta-label {
            color: var(--text-muted);
            font-weight: 500;
        }
        .profile-meta-value {
            font-weight: 600;
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-chalkboard-user"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Educator</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="attendance.html" class="nav-item-link">
                    <i class="fa-solid fa-calendar-check"></i> Mark Attendance
                </a>
                <a href="marks.html" class="nav-item-link">
                    <i class="fa-solid fa-file-signature"></i> Manage Marks
                </a>
                <a href="homework.html" class="nav-item-link">
                    <i class="fa-solid fa-book-open"></i> Homework Assignments
                </a>
                <a href="subjects.html" class="nav-item-link">
                    <i class="fa-solid fa-book"></i> My Subjects
                </a>
                <a href="profile.html" class="nav-item-link active">
                    <i class="fa-solid fa-user"></i> My Profile
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">My Profile</h1>
                </div>
                <div class="header-right">
                    <button class="header-action-btn" id="theme-toggle-btn"><i class="fa-solid fa-moon" id="theme-toggle-icon"></i></button>
                </div>
            </header>

            <div class="profile-container anim-slide-up">
                <!-- Profile Summary Overview -->
                <div class="glass-card profile-header-card">
                    <div class="profile-avatar-large"><i class="fa-solid fa-chalkboard-user"></i></div>
                    <h2 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 4px;" id="profile-name">Educator Name</h2>
                    <span class="badge badge-info" style="margin-bottom: 24px;" id="profile-employee">Employee ID</span>

                    <div style="text-align: left; width: 100%;">
                        <div class="profile-meta-row">
                            <span class="profile-meta-label">Email</span>
                            <span class="profile-meta-value" id="profile-email">email@teachers.edu</span>
                        </div>
                        <div class="profile-meta-row">
                            <span class="profile-meta-label">Joined Date</span>
                            <span class="profile-meta-value" id="profile-joining">N/A</span>
                        </div>
                        <div class="profile-meta-row">
                            <span class="profile-meta-label">Account Status</span>
                            <span class="profile-meta-value text-success"><i class="fa-solid fa-circle-check"></i> Active</span>
                        </div>
                    </div>
                </div>

                <!-- Forms Tabs card -->
                <div class="glass-card" style="padding: 32px;">
                    <h3 style="font-weight: 700; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">Edit Contact Details</h3>
                    <form id="profile-form" style="margin-bottom: 40px;">
                        <div class="form-group">
                            <label class="form-label" for="phone">Phone Number</label>
                            <input type="text" id="phone" class="form-control" placeholder="e.g. +1 555 0199">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="qualification">Qualifications Details</label>
                            <input type="text" id="qualification" class="form-control" placeholder="e.g. M.Sc. Mathematics, B.Ed.">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>

                    <h3 style="font-weight: 700; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">Change Password</h3>
                    <form id="password-form">
                        <div class="form-group">
                            <label class="form-label" for="old_password">Current Password</label>
                            <input type="password" id="old_password" class="form-control" required placeholder="Enter current password">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="new_password">New Password</label>
                            <input type="password" id="new_password" class="form-control" required placeholder="Minimum 6 characters">
                        </div>
                        <button type="submit" class="btn btn-accent">Change Password</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const teacherId = window.profile_details.id;
            const userId = window.current_user.id;

            document.getElementById('user-display-name').textContent = sanitize(window.profile_details.name);
            document.getElementById('profile-name').textContent = sanitize(window.profile_details.name);
            document.getElementById('profile-employee').textContent = `Employee ID: ${sanitize(window.profile_details.employee_id)}`;
            document.getElementById('profile-email').textContent = sanitize(window.current_user.email);
            document.getElementById('profile-joining').textContent = sanitize(window.profile_details.joining_date || 'N/A');

            // Values
            document.getElementById('phone').value = window.profile_details.phone || '';
            document.getElementById('qualification').value = window.profile_details.qualification || '';

            // Handle edit details submit
            document.getElementById('profile-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const phone = document.getElementById('phone').value.trim();
                const qualification = document.getElementById('qualification').value.trim();

                const teachers = db.getCollection(window.DB_KEYS.TEACHERS);
                const tIdx = teachers.findIndex(t => t.id === teacherId);
                if (tIdx !== -1) {
                    teachers[tIdx].phone = phone;
                    teachers[tIdx].qualification = qualification;
                    db.saveCollection(window.DB_KEYS.TEACHERS, teachers);

                    const session = db.getCurrentSession();
                    session.profile = teachers[tIdx];
                    sessionStorage.setItem('school_erp_active_session', JSON.stringify(session));

                    alert('Contact information saved successfully!');
                    location.reload();
                }
            });

            // Handle password change
            document.getElementById('password-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const oldPass = document.getElementById('old_password').value;
                const newPass = document.getElementById('new_password').value;

                if (newPass.length < 6) {
                    alert('New password must be at least 6 characters long.');
                    return;
                }

                const users = db.getCollection(window.DB_KEYS.USERS);
                const uIdx = users.findIndex(u => u.id === userId);
                if (uIdx !== -1) {
                    if (users[uIdx].password !== oldPass) {
                        alert('Incorrect current password.');
                        return;
                    }

                    users[uIdx].password = newPass;
                    db.saveCollection(window.DB_KEYS.USERS, users);
                    alert('Password changed successfully!');
                    document.getElementById('password-form').reset();
                }
            });
        });
    </script>
</body>
</html>
