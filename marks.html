<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks Audit | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-user-shield"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Administrator</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item-link">
                    <i class="fa-solid fa-user-graduate"></i> Students
                </a>
                <a href="teachers.html" class="nav-item-link">
                    <i class="fa-solid fa-chalkboard-user"></i> Teachers
                </a>
                <a href="classes.html" class="nav-item-link">
                    <i class="fa-solid fa-school"></i> Classes
                </a>
                <a href="subjects.html" class="nav-item-link">
                    <i class="fa-solid fa-book"></i> Subjects
                </a>
                <a href="attendance.html" class="nav-item-link">
                    <i class="fa-solid fa-calendar-check"></i> Attendance
                </a>
                <a href="marks.html" class="nav-item-link active">
                    <i class="fa-solid fa-file-signature"></i> Marks
                </a>
                <a href="results.html" class="nav-item-link">
                    <i class="fa-solid fa-square-poll-vertical"></i> Results
                </a>
                <a href="certificates.html" class="nav-item-link">
                    <i class="fa-solid fa-award"></i> Certificates
                </a>
                <a href="reports.html" class="nav-item-link">
                    <i class="fa-solid fa-chart-line"></i> Reports
                </a>
                <a href="settings.html" class="nav-item-link">
                    <i class="fa-solid fa-sliders"></i> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">Student Grades Override</h1>
                </div>
            </header>

            <!-- Filters -->
            <div class="glass-card anim-slide-up" style="padding: 24px; margin-bottom: 24px;">
                <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end;">
                    <div class="form-group" style="margin-bottom: 0; flex: 1.2; min-width: 180px;">
                        <label class="form-label" for="class_id">Class Section</label>
                        <select id="class_id" class="form-control" onchange="updateSubjectsList()">
                            <option value="">Choose Class</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 0; flex: 1.2; min-width: 180px;">
                        <label class="form-label" for="subject_id">Subject</label>
                        <select id="subject_id" class="form-control">
                            <option value="">Choose Subject</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 150px;">
                        <label class="form-label" for="exam_type">Evaluation Type</label>
                        <select id="exam_type" class="form-control">
                            <option value="Quiz">Quiz</option>
                            <option value="Midterm">Midterm</option>
                            <option value="Final">Final Exam</option>
                            <option value="Assignment">Assignment</option>
                            <option value="Project">Project</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 0; flex: 1.2; min-width: 180px;">
                        <label class="form-label" for="grading_period">Grading Session Term</label>
                        <input type="text" id="grading_period" class="form-control" value="Term 1 2026">
                    </div>

                    <button class="btn btn-primary" onclick="loadEvaluationSheet()" style="height: 48px;">
                        <i class="fa-solid fa-magnifying-glass"></i> Load List
                    </button>
                </div>
            </div>

            <!-- Spreadsheet Override -->
            <div class="glass-card anim-slide-up" id="sheet-card" style="display: none; padding: 32px;">
                <div class="card-header" style="margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);">
                    <h3 class="card-title" id="sheet-title">Grades Override</h3>
                    <button class="btn btn-primary" onclick="saveEvaluationSheet()">Save Overrides</button>
                </div>
                <div class="table-responsive">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th>Roll No</th>
                                <th>Admission No</th>
                                <th>Student Name</th>
                                <th style="width: 150px;">Marks Obtained</th>
                                <th style="width: 150px;">Max Marks Possible</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody id="students-marks-list">
                            <!-- JS dynamically loaded -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-display-name').textContent = sanitize(window.current_user.username);

            // Populate class selections
            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const selectEl = document.getElementById('class_id');
            classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = `${c.class_name} - ${c.section}`;
                selectEl.appendChild(opt);
            });
        });

        function updateSubjectsList() {
            const classId = parseInt(document.getElementById('class_id').value);
            const assignments = db.getCollection(window.DB_KEYS.ASSIGNMENTS);
            const classAssigned = assignments.filter(a => Number(a.class_id) === Number(classId));
            const subjects = db.getCollection(window.DB_KEYS.SUBJECTS);
            
            const subSelect = document.getElementById('subject_id');
            subSelect.innerHTML = '<option value="">Choose Subject</option>';

            const uniqueSubIds = [...new Set(classAssigned.map(a => a.subject_id))];
            uniqueSubIds.forEach(sid => {
                const sub = subjects.find(s => s.id === sid);
                if (sub) {
                    const opt = document.createElement('option');
                    opt.value = sub.id;
                    opt.textContent = `${sub.subject_name} (${sub.subject_code})`;
                    subSelect.appendChild(opt);
                }
            });
        }

        function loadEvaluationSheet() {
            const classId = parseInt(document.getElementById('class_id').value);
            const subjectId = parseInt(document.getElementById('subject_id').value);
            const examType = document.getElementById('exam_type').value;
            const gradingPeriod = document.getElementById('grading_period').value.trim();

            if (!classId || !subjectId || !examType || !gradingPeriod) {
                alert('Please select all filters.');
                return;
            }

            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const subjects = db.getCollection(window.DB_KEYS.SUBJECTS);
            const selectedClass = classes.find(c => c.id === classId);
            const selectedSub = subjects.find(s => s.id === subjectId);

            document.getElementById('sheet-title').textContent = `Marks Override: ${selectedClass.class_name} - ${selectedClass.section} | ${selectedSub.subject_name} (${examType})`;

            const students = db.getCollection(window.DB_KEYS.STUDENTS);
            const classStudents = students.filter(s => Number(s.class_id) === Number(classId) && s.status === 'active').sort((a,b) => a.roll_no - b.roll_no);

            const marks = db.getCollection(window.DB_KEYS.MARKS);
            const existingGrades = marks.filter(m => m.subject_id === subjectId && m.exam_type === examType && m.grading_period === gradingPeriod);

            const container = document.getElementById('students-marks-list');
            if (classStudents.length > 0) {
                container.innerHTML = classStudents.map(s => {
                    const gradeRecord = existingGrades.find(g => g.student_id === s.id);
                    const obtained = gradeRecord ? gradeRecord.marks_obtained : '';
                    const maxMarks = gradeRecord ? gradeRecord.max_marks : '100';
                    const remarks = gradeRecord ? gradeRecord.remarks : '';

                    return `
                        <tr data-student-id="${s.id}">
                            <td><strong>${s.roll_no}</strong></td>
                            <td><span class="badge badge-info">${sanitize(s.admission_no)}</span></td>
                            <td style="font-weight: 600;">${sanitize(s.name)}</td>
                            <td>
                                <input type="number" step="0.01" class="form-control marks-obtained-input" style="height: 32px;" value="${obtained}" placeholder="Obtained" required>
                            </td>
                            <td>
                                <input type="number" step="0.01" class="form-control marks-max-input" style="height: 32px;" value="${maxMarks}" placeholder="Max marks" required>
                            </td>
                            <td>
                                <input type="text" class="form-control marks-remarks-input" style="height: 32px;" value="${sanitize(remarks)}" placeholder="Optional remarks">
                            </td>
                        </tr>
                    `;
                }).join('');
                document.getElementById('sheet-card').style.display = 'block';
            } else {
                container.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 24px;">No active students enrolled.</td></tr>';
                document.getElementById('sheet-card').style.display = 'block';
            }
        }

        function saveEvaluationSheet() {
            const subjectId = parseInt(document.getElementById('subject_id').value);
            const examType = document.getElementById('exam_type').value;
            const gradingPeriod = document.getElementById('grading_period').value.trim();

            if (!subjectId || !examType || !gradingPeriod) return;

            const marks = db.getCollection(window.DB_KEYS.MARKS);
            // Remove existing registers logs
            let filtered = marks.filter(m => !(m.subject_id === subjectId && m.exam_type === examType && m.grading_period === gradingPeriod));

            const rows = document.querySelectorAll('#students-marks-list tr[data-student-id]');
            let isValid = true;

            rows.forEach(row => {
                const studentId = parseInt(row.getAttribute('data-student-id'));
                const obtainedVal = row.querySelector('.marks-obtained-input').value;
                const maxVal = row.querySelector('.marks-max-input').value;
                const remarks = row.querySelector('.marks-remarks-input').value.trim();

                if (obtainedVal === '' || maxVal === '') {
                    isValid = false;
                    return;
                }

                const obtained = parseFloat(obtainedVal);
                const maxMarks = parseFloat(maxVal);

                if (obtained > maxMarks) {
                    alert(`Error: Obtained marks (${obtained}) cannot exceed maximum marks (${maxMarks}).`);
                    isValid = false;
                    return;
                }

                filtered.push({
                    id: Date.now() + Math.random(),
                    student_id: studentId,
                    subject_id: subjectId,
                    exam_type: examType,
                    marks_obtained: obtained,
                    max_marks: maxMarks,
                    grading_period: gradingPeriod,
                    remarks: remarks
                });
            });

            if (!isValid) return;

            db.saveCollection(window.DB_KEYS.MARKS, filtered);
            alert('Evaluation marks overrides saved successfully!');
            loadEvaluationSheet();
        }
    </script>
</body>
</html>
