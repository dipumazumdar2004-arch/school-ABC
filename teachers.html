<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Teachers | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #ffffff;
            color: #1e293b;
            padding: 32px;
            border-radius: var(--border-radius);
            max-width: 550px;
            width: 90%;
            box-shadow: 0 10px 45px rgba(0,0,0,0.15);
        }
        .form-row-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-user-shield"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Administrator</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item-link">
                    <i class="fa-solid fa-user-graduate"></i> Students
                </a>
                <a href="teachers.html" class="nav-item-link active">
                    <i class="fa-solid fa-chalkboard-user"></i> Teachers
                </a>
                <a href="classes.html" class="nav-item-link">
                    <i class="fa-solid fa-school"></i> Classes
                </a>
                <a href="subjects.html" class="nav-item-link">
                    <i class="fa-solid fa-book"></i> Subjects
                </a>
                <a href="attendance.html" class="nav-item-link">
                    <i class="fa-solid fa-calendar-check"></i> Attendance
                </a>
                <a href="marks.html" class="nav-item-link">
                    <i class="fa-solid fa-file-signature"></i> Marks
                </a>
                <a href="results.html" class="nav-item-link">
                    <i class="fa-solid fa-square-poll-vertical"></i> Results
                </a>
                <a href="certificates.html" class="nav-item-link">
                    <i class="fa-solid fa-award"></i> Certificates
                </a>
                <a href="reports.html" class="nav-item-link">
                    <i class="fa-solid fa-chart-line"></i> Reports
                </a>
                <a href="settings.html" class="nav-item-link">
                    <i class="fa-solid fa-sliders"></i> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">Teacher Directory Setup</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="openTeacherModal()">
                        <i class="fa-solid fa-user-plus"></i> Add New Instructor
                    </button>
                </div>
            </header>

            <!-- Directory Table -->
            <div class="glass-card anim-slide-up">
                <div class="card-header">
                    <h3 class="card-title">Active Faculty Members</h3>
                    <i class="fa-solid fa-chalkboard-user text-muted"></i>
                </div>
                <div class="card-body" style="padding: 0;">
                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th>Employee ID</th>
                                    <th>Name</th>
                                    <th>Qualifications</th>
                                    <th>Phone Contact</th>
                                    <th>Joining Date</th>
                                    <th>Status</th>
                                    <th style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="teachers-table-body">
                                <!-- JS dynamic rendering -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Instructor Form Modal -->
    <div class="modal" id="teacher-modal">
        <div class="modal-content glass-card" style="background: #ffffff; color: #1e293b;">
            <h3 style="font-weight: 700; margin-bottom: 24px; color: var(--primary);" id="modal-title">Instructor Registration Form</h3>
            <form id="teacher-form">
                <input type="hidden" id="teacher-id">

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="employee_id">Employee ID</label>
                        <input type="text" id="employee_id" class="form-control" required placeholder="e.g. EMP003">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="name">Full Teacher Name</label>
                        <input type="text" id="name" class="form-control" required placeholder="e.g. John Doe">
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="username">Portal Username</label>
                        <input type="text" id="username" class="form-control" required placeholder="e.g. jdoe">
                    </div>
                    <div class="form-group" id="pass-group">
                        <label class="form-label" for="password">Portal Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Defaults to username123 if blank">
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="email">Official Email</label>
                        <input type="email" id="email" class="form-control" required placeholder="e.g. jdoe@school.edu">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Contact</label>
                        <input type="text" id="phone" class="form-control" placeholder="e.g. +1 555 0199">
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="qualification">Qualifications details</label>
                        <input type="text" id="qualification" class="form-control" placeholder="e.g. M.Sc. Mathematics, B.Ed.">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="joining_date">Joining Date</label>
                        <input type="date" id="joining_date" class="form-control" required>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
                    <button type="button" class="btn btn-secondary" onclick="closeTeacherModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save details</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-display-name').textContent = sanitize(window.current_user.username);
            renderTeachers();

            document.getElementById('teacher-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveTeacher();
            });
        });

        function renderTeachers() {
            const teachers = db.getCollection(window.DB_KEYS.TEACHERS);
            const container = document.getElementById('teachers-table-body');

            if (teachers.length > 0) {
                container.innerHTML = teachers.map(t => {
                    let badgeClass = t.status === 'active' ? 'badge-success' : 'badge-danger';
                    return `
                        <tr>
                            <td><span class="badge badge-info">${sanitize(t.employee_id)}</span></td>
                            <td style="font-weight: 600;">${sanitize(t.name)}</td>
                            <td>${sanitize(t.qualification || '-')}</td>
                            <td>${sanitize(t.phone || '-')}</td>
                            <td>${sanitize(t.joining_date)}</td>
                            <td><span class="badge ${badgeClass}">${t.status}</span></td>
                            <td style="text-align: right;">
                                <button class="btn btn-xs btn-primary" style="margin-right: 4px;" onclick="editTeacher(${t.id})"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="btn btn-xs btn-danger" onclick="deleteTeacher(${t.id})"><i class="fa-solid fa-trash-can"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } else {
                container.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-muted); padding: 40px;">No instructors registered yet.</td></tr>';
            }
        }

        function openTeacherModal(id = null) {
            const modal = document.getElementById('teacher-modal');
            const titleEl = document.getElementById('modal-title');
            const form = document.getElementById('teacher-form');
            form.reset();

            if (id) {
                titleEl.textContent = 'Edit Instructor Details';
                document.getElementById('teacher-id').value = id;

                const teachers = db.getCollection(window.DB_KEYS.TEACHERS);
                const t = teachers.find(item => item.id === id);
                const users = db.getCollection(window.DB_KEYS.USERS);
                const u = users.find(item => item.id === t.user_id);

                document.getElementById('employee_id').value = t.employee_id;
                document.getElementById('name').value = t.name;
                document.getElementById('username').value = u.username;
                document.getElementById('email').value = u.email;
                document.getElementById('phone').value = t.phone;
                document.getElementById('qualification').value = t.qualification;
                document.getElementById('joining_date').value = t.joining_date;

                document.getElementById('pass-group').style.display = 'none';
            } else {
                titleEl.textContent = 'Instructor Registration Form';
                document.getElementById('teacher-id').value = '';
                document.getElementById('pass-group').style.display = 'block';
            }

            modal.style.display = 'flex';
        }

        function closeTeacherModal() {
            document.getElementById('teacher-modal').style.display = 'none';
        }

        function saveTeacher() {
            const idVal = document.getElementById('teacher-id').value;
            const employeeId = document.getElementById('employee_id').value.trim();
            const name = document.getElementById('name').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const qualification = document.getElementById('qualification').value.trim();
            const joiningDate = document.getElementById('joining_date').value;

            const teachers = db.getCollection(window.DB_KEYS.TEACHERS);
            const users = db.getCollection(window.DB_KEYS.USERS);

            if (idVal) {
                // Update
                const id = parseInt(idVal);
                const tIdx = teachers.findIndex(t => t.id === id);
                if (tIdx !== -1) {
                    teachers[tIdx].employee_id = employeeId;
                    teachers[tIdx].name = name;
                    teachers[tIdx].phone = phone;
                    teachers[tIdx].qualification = qualification;
                    teachers[tIdx].joining_date = joiningDate;

                    const uIdx = users.findIndex(u => u.id === teachers[tIdx].user_id);
                    if (uIdx !== -1) {
                        users[uIdx].username = username;
                        users[uIdx].email = email;
                    }

                    db.saveCollection(window.DB_KEYS.TEACHERS, teachers);
                    db.saveCollection(window.DB_KEYS.USERS, users);
                }
            } else {
                // Add new
                const passVal = document.getElementById('password').value;
                const password = passVal !== '' ? passVal : `${username}123`;

                const newUserId = Date.now();
                users.push({
                    id: newUserId,
                    username: username,
                    password: password,
                    email: email,
                    role: 'teacher',
                    status: 'active'
                });

                teachers.push({
                    id: Date.now() + 1,
                    user_id: newUserId,
                    employee_id: employeeId,
                    name: name,
                    phone: phone,
                    qualification: qualification,
                    joining_date: joiningDate,
                    status: 'active'
                });

                db.saveCollection(window.DB_KEYS.USERS, users);
                db.saveCollection(window.DB_KEYS.TEACHERS, teachers);
            }

            alert('Instructor saved successfully!');
            closeTeacherModal();
            renderTeachers();
        }

        function editTeacher(id) {
            openTeacherModal(id);
        }

        function deleteTeacher(id) {
            if (!confirm('Are you sure you want to remove this instructor?')) return;
            const teachers = db.getCollection(window.DB_KEYS.TEACHERS);
            const users = db.getCollection(window.DB_KEYS.USERS);

            const teacherObj = teachers.find(t => t.id === id);
            const filteredTeachers = teachers.filter(t => t.id !== id);
            const filteredUsers = users.filter(u => u.id !== teacherObj.user_id);

            db.saveCollection(window.DB_KEYS.TEACHERS, filteredTeachers);
            db.saveCollection(window.DB_KEYS.USERS, filteredUsers);
            renderTeachers();
        }
    </script>
</body>
</html>
