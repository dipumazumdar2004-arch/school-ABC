<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Results | SchoolERP-Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animation.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        @media print {
            body * {
                visibility: hidden;
            }
            .sidebar, .top-header, .glass-card:first-of-type, #print-btn {
                display: none !important;
            }
            .main-content, #rankings-card, #rankings-card * {
                visibility: visible;
            }
            .main-content {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
            }
            .table-custom th, .table-custom td {
                padding: 8px 12px !important;
                border-bottom: 1px solid #cbd5e1 !important;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SchoolERP-Pro</span>
            </div>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fa-solid fa-user-shield"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="user-display-name">Loading...</div>
                    <div class="sidebar-user-role">Administrator</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item-link">
                    <i class="fa-solid fa-user-graduate"></i> Students
                </a>
                <a href="teachers.html" class="nav-item-link">
                    <i class="fa-solid fa-chalkboard-user"></i> Teachers
                </a>
                <a href="classes.html" class="nav-item-link">
                    <i class="fa-solid fa-school"></i> Classes
                </a>
                <a href="subjects.html" class="nav-item-link">
                    <i class="fa-solid fa-book"></i> Subjects
                </a>
                <a href="attendance.html" class="nav-item-link">
                    <i class="fa-solid fa-calendar-check"></i> Attendance
                </a>
                <a href="marks.html" class="nav-item-link">
                    <i class="fa-solid fa-file-signature"></i> Marks
                </a>
                <a href="results.html" class="nav-item-link active">
                    <i class="fa-solid fa-square-poll-vertical"></i> Results
                </a>
                <a href="certificates.html" class="nav-item-link">
                    <i class="fa-solid fa-award"></i> Certificates
                </a>
                <a href="reports.html" class="nav-item-link">
                    <i class="fa-solid fa-chart-line"></i> Reports
                </a>
                <a href="settings.html" class="nav-item-link">
                    <i class="fa-solid fa-sliders"></i> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="db.logout()" class="nav-item-link text-danger" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; padding: 12px 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="header-title">Class Rankings Engine</h1>
                </div>
            </header>

            <!-- Filters -->
            <div class="glass-card anim-slide-up" style="padding: 24px; margin-bottom: 24px;">
                <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end;">
                    <div class="form-group" style="margin-bottom: 0; flex: 1.5; min-width: 240px;">
                        <label class="form-label" for="class_id">Select Class Section</label>
                        <select id="class_id" class="form-control" onchange="compileRankings()">
                            <option value="">Select Class</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="compileRankings()" style="height: 48px;">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Compile Rankings
                    </button>
                    <button class="btn btn-accent" id="print-btn" onclick="window.print()" style="height: 48px; display: none;">
                        <i class="fa-solid fa-print"></i> Print Rankings
                    </button>
                </div>
            </div>

            <!-- Rankings Sheet -->
            <div class="glass-card anim-slide-up" id="rankings-card" style="display: none; padding: 32px;">
                <div class="card-header" style="margin-bottom: 24px;">
                    <h3 class="card-title" id="rankings-title">Class Scorecard</h3>
                </div>
                <div class="table-responsive">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Admission No</th>
                                <th>Student Name</th>
                                <th style="text-align: right;">Total Obtained</th>
                                <th style="text-align: right;">Max Marks Possible</th>
                                <th style="text-align: right;">Weighted Average (%)</th>
                            </tr>
                        </thead>
                        <tbody id="rankings-list">
                            <!-- JS loop -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-display-name').textContent = sanitize(window.current_user.username);

            // Populate class selections
            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const selectEl = document.getElementById('class_id');
            classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = `${c.class_name} - ${c.section}`;
                selectEl.appendChild(opt);
            });
        });

        function compileRankings() {
            const classId = parseInt(document.getElementById('class_id').value);
            if (!classId) return;

            const classes = db.getCollection(window.DB_KEYS.CLASSES);
            const activeClass = classes.find(c => c.id === classId);
            document.getElementById('rankings-title').textContent = `Class Scorecard Rankings: ${activeClass.class_name} - ${activeClass.section}`;

            const students = db.getCollection(window.DB_KEYS.STUDENTS).filter(s => Number(s.class_id) === Number(classId) && s.status === 'active');
            const marks = db.getCollection(window.DB_KEYS.MARKS);

            // Compute performance metrics for each student
            const reports = students.map(s => {
                const stuMarks = marks.filter(m => m.student_id === s.id);
                let totalObtained = 0;
                let totalMax = 0;

                stuMarks.forEach(m => {
                    totalObtained += parseFloat(m.marks_obtained);
                    totalMax += parseFloat(m.max_marks);
                });

                const percentage = totalMax > 0 ? (totalObtained / totalMax) * 100 : 0;
                return {
                    student: s,
                    obtained: totalObtained,
                    maxMarks: totalMax,
                    percentage: percentage
                };
            });

            // Sort by percentage descending
            reports.sort((a,b) => b.percentage - a.percentage);

            const container = document.getElementById('rankings-list');
            if (reports.length > 0) {
                container.innerHTML = reports.map((r, index) => `
                    <tr>
                        <td><strong>${index + 1}</strong></td>
                        <td><span class="badge badge-info">${sanitize(r.student.admission_no)}</span></td>
                        <td style="font-weight: 600;">${sanitize(r.student.name)}</td>
                        <td style="text-align: right; font-weight: 700;">${r.obtained}</td>
                        <td style="text-align: right; font-weight: 600; color: var(--text-muted);">${r.maxMarks}</td>
                        <td style="text-align: right; font-weight: 700; color: var(--primary);">${r.percentage.toFixed(1)}%</td>
                    </tr>
                `).join('');
                document.getElementById('rankings-card').style.display = 'block';
                document.getElementById('print-btn').style.display = 'inline-block';
            } else {
                container.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 24px;">No students mapped or graded.</td></tr>';
                document.getElementById('rankings-card').style.display = 'block';
                document.getElementById('print-btn').style.display = 'none';
            }
        }
    </script>
</body>
</html>
